name: sapbaq
description: "Sapbaq (سَبّاق) — order bottled water for delivery to mosques in Kuwait."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+4

environment:
  sdk: ^3.11.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  # Routing
  go_router: ^17.2.3

  # Networking & storage
  dio: ^5.9.2
  # Pinned to 9.x: v10's iOS impl uses the experimental `objective_c` native
  # assets, which fail to load on stable Flutter (dlopen objective_c.framework).
  flutter_secure_storage: ^9.2.4

  # Localization & UI
  intl: ^0.20.2
  google_fonts: ^8.1.0
  intl_phone_field: ^3.2.0

  # Maps
  google_maps_flutter: ^2.17.0

  # Open external links (e.g. info/contact screens) in the device's browser.
  # All images and videos play in-app via the widgets below.
  url_launcher: ^6.3.0

  # In-app media playback (product gallery, showcase, delivery-proof videos).
  # chewie wraps video_player with a play/pause/scrub/fullscreen UI.
  video_player: ^2.9.2
  chewie: ^1.8.5
  shared_preferences: ^2.5.5
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1

  # App version shown on the About screen (read from the platform at runtime).
  # Pinned to 9.x to match the resolved version and stay off v10's chain.
  package_info_plus: ^9.0.0

  # Pick an image (gallery/camera) to attach to a support-ticket reply.
  image_picker: ^1.1.2

  # Renders the official multicolor Google "G" mark (inline SVG) on the branded
  # sign-in button — the mark stays multicolor in both themes per Google's spec.
  flutter_svg: ^2.0.17

  # Passwordless auth: social sign-in (Google/Apple) + phone OTP. No passwords.
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^6.1.4
  # SHA-256 of the Apple sign-in nonce (raw nonce sent to Apple, hash to server).
  crypto: ^3.0.6
  # Passkeys (WebAuthn) for fast daily sign-in. Server drives the challenge; this
  # bridges the platform authenticator (Face ID / fingerprint / device PIN).
  passkeys: ^2.4.0

# Pin the iOS/macOS path_provider impl to 2.5.1 — the latest WITHOUT the
# experimental `objective_c` native-assets dependency (2.5.0 & 2.6.0 add it,
# which fails to load at runtime on stable Flutter). Pulled in via google_fonts.
dependency_overrides:
  path_provider_foundation: 2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  # Generates the app launcher icons from assets/icon/ — run:
  #   dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.4

# Launcher icon: the Sapbaq mark (mint arrows + white dots/dashes, no wordmark)
# on black. Android uses an adaptive icon (black background + the mark
# foreground); iOS flattens onto black.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#000000"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Generate localization (AppLocalizations) from lib/l10n/*.arb (see l10n.yaml).
  generate: true

  assets:
    - assets/images/logo/
    # Bundled IBM Plex Sans Arabic (Arabic) + Poppins (Latin) so google_fonts uses these
    # instead of fetching from fonts.gstatic.com at runtime (works offline).
    - assets/google_fonts/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
